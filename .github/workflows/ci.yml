name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pythonhashseed: ["0", "1", "520", "2026", "42"]
    env:
      PYTHONHASHSEED: ${{ matrix.pythonhashseed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Compile
        run: python -m compileall chan520_skill scripts tests
      - name: Diff check
        run: git diff --check
      - name: Pytest
        run: pytest -q

